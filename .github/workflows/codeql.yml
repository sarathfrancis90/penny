name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.github/workflows/codeql.yml'
  schedule:
    # Weekly Monday 06:00 UTC — catches advisories on branches that haven't
    # been touched recently.
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # build-mode: none — CodeQL scans JS/TS source directly, no
          # `next build` required. Avoids needing env vars (Firebase
          # config etc.) in the workflow.
          build-mode: none
          # Default suite only. `security-and-quality` would produce
          # large numbers of taint-flow alerts on the Firestore param-
          # query pattern used throughout src/app/api/** which aren't
          # actually injectable. Re-enable once the baseline is clean.
          config: |
            paths-ignore:
              - mobile
              - .next
              - node_modules
              - 'src/**/*.test.ts'
              - 'src/**/*.test.tsx'
              - 'src/test/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
