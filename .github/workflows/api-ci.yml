name: API CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api-ci:
    name: api-ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCIBuildOnly0000000000000000000000
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: penny-ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: penny-ci
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: penny-ci.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
      FIREBASE_PROJECT_ID: penny-ci
      FIREBASE_ADMIN_ALLOW_BUILD_FALLBACK: "true"
      GEMINI_API_KEY: penny-ci-build-only

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API and CI scripts with zero warnings
        run: npm run lint:ci

      - name: API typecheck, tests, and build
        run: npm run api:check

      - name: API contract check
        run: npm run api:contract

      - name: Mobile must use standalone API only
        run: npm run mobile:api-only:check

      - name: Build API container
        run: docker build -f Dockerfile.api -t "penny-api-ci:${GITHUB_SHA}" .
