name: Backend Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/api/**'
      - 'packages/**'
      - 'scripts/api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.api.json'
      - 'Dockerfile.api'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/api/**'
      - 'packages/**'
      - 'scripts/api/**'
      - 'tsconfig.api.json'
      - 'Dockerfile.api'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCIBuildOnly0000000000000000000000
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: penny-ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: penny-ci
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: penny-ci.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
      FIREBASE_PROJECT_ID: penny-ci
      FIREBASE_ADMIN_ALLOW_BUILD_FALLBACK: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: API TypeScript type check
        run: npm run api:typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: API checks
        run: npm run api:check

      - name: API contract check
        run: npm run api:contract

      - name: Verify build
        run: npm run build
