name: Backend Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCIBuildOnly0000000000000000000000
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: penny-ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: penny-ci
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: penny-ci.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
      FIREBASE_PROJECT_ID: penny-ci
      FIREBASE_ADMIN_ALLOW_BUILD_FALLBACK: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Web lint compatibility
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Verify build
        run: npm run build
