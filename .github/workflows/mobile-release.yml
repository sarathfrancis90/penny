name: Mobile Internal Release

# Tag push or manual dispatch uploads internal builds only:
# - iOS: TestFlight
# - Android: Play internal testing
# Production promotion is handled by mobile-production-promotion.yml.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version, without v prefix. Must match mobile/pubspec.yaml.'
        required: true
        type: string
      build_number:
        description: 'Optional build number. Defaults to github.run_number + 10000 to stay above store build codes.'
        required: false
        type: string
      platform:
        description: 'Platform to upload. Use ios/android for store-specific retries.'
        required: false
        default: all
        type: choice
        options:
          - all
          - ios
          - android

concurrency:
  group: mobile-internal-release-${{ github.ref }}-${{ github.event.inputs.version || github.ref_name }}-${{ github.event.inputs.platform || 'all' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  derive:
    name: Derive version + validate release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.derive.outputs.version }}
      build_number: ${{ steps.derive.outputs.build_number }}
      release_notes: ${{ steps.derive.outputs.release_notes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Derive version, build, and release notes
        id: derive
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_BUILD: ${{ github.event.inputs.build_number }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Internal releases must be built from a commit contained in origin/main."
            exit 1
          fi

          if [ -n "${DISPATCH_BUILD:-}" ]; then
            BUILD_NUMBER="$DISPATCH_BUILD"
          else
            BUILD_NUMBER=$(( ${{ github.run_number }} + 10000 ))
          fi

          PUBSPEC_VERSION="$(awk '/^version:/ {print $2; exit}' mobile/pubspec.yaml)"
          PUBSPEC_NAME="${PUBSPEC_VERSION%%+*}"
          if [ "$VERSION" != "$PUBSPEC_NAME" ]; then
            echo "::error::Release version $VERSION does not match mobile/pubspec.yaml version $PUBSPEC_NAME."
            exit 1
          fi

          if ! printf '%s' "$BUILD_NUMBER" | grep -Eq '^[0-9]+$'; then
            echo "::error::Build number must be numeric."
            exit 1
          fi

          NOTES_FILE="mobile/release_notes/v${VERSION}.txt"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file $NOTES_FILE does not exist. Create it before releasing."
            exit 1
          fi

          NOTES="$(cat "$NOTES_FILE")"

          {
            echo "version=$VERSION"
            echo "build_number=$BUILD_NUMBER"
            echo "release_notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "version=$VERSION build=$BUILD_NUMBER notes_file=$NOTES_FILE"

  preflight:
    name: Same-SHA mobile preflight
    needs: derive
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read pinned Flutter version
        id: flutter
        working-directory: mobile
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile
        run: flutter analyze

      - name: Run mobile tests
        working-directory: mobile
        run: flutter test --coverage --reporter expanded test

      - name: Check standalone API-only mobile boundary
        run: npm ci && npm run mobile:api-only:check

  ios:
    name: iOS -> TestFlight internal
    needs: [derive, preflight]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read pinned tool versions
        id: tools
        working-directory: mobile
        run: |
          echo "flutter=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          echo "ruby=$(cat .ruby-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ steps.tools.outputs.flutter }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455
        with:
          ruby-version: ${{ steps.tools.outputs.ruby }}
          bundler-cache: true
          working-directory: mobile

      - name: Restore App Store Connect API key
        working-directory: mobile/fastlane
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          test -n "${ASC_API_KEY_P8}"
          umask 077
          printf '%s' "$ASC_API_KEY_P8" > AuthKey_P97VLS6M6Z.p8
          test -s AuthKey_P97VLS6M6Z.p8

      - name: Restore distribution certificate to a temporary keychain
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${IOS_DIST_CERT_P12_BASE64}"
          test -n "${IOS_DIST_CERT_PASSWORD}"
          test -n "${KEYCHAIN_PASSWORD}"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          test -s "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution"

      - name: Upload TestFlight internal build
        working-directory: mobile
        env:
          VERSION: ${{ needs.derive.outputs.version }}
          BUILD_NUMBER: ${{ needs.derive.outputs.build_number }}
          NOTES: ${{ needs.derive.outputs.release_notes }}
        run: |
          bundle exec fastlane ios internal \
            version:"$VERSION" \
            build:"$BUILD_NUMBER" \
            notes:"$NOTES"

      - name: Upload iOS release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-release-evidence-ios
          path: mobile/build/release-evidence/mobile-release-evidence-ios.json
          retention-days: 90

      - name: Always cleanup keychain + secrets
        if: always()
        run: |
          if security show-keychain-info "$RUNNER_TEMP/build.keychain-db" >/dev/null 2>&1; then
            security delete-keychain "$RUNNER_TEMP/build.keychain-db"
          fi
          rm -f "$RUNNER_TEMP/dist_cert.p12" mobile/fastlane/AuthKey_P97VLS6M6Z.p8

  android:
    name: Android -> Play internal
    needs: [derive, preflight]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read pinned tool versions
        id: tools
        working-directory: mobile
        run: |
          echo "flutter=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          echo "ruby=$(cat .ruby-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ steps.tools.outputs.flutter }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455
        with:
          ruby-version: ${{ steps.tools.outputs.ruby }}
          bundler-cache: true
          working-directory: mobile

      - name: Restore Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          set -euo pipefail
          test -n "${ANDROID_KEYSTORE_BASE64}"
          test -n "${ANDROID_KEY_PROPERTIES}"
          umask 077
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > mobile/android/app/penny_release_key.jks
          test -s mobile/android/app/penny_release_key.jks
          printf '%s' "$ANDROID_KEY_PROPERTIES" > mobile/android/key.properties
          test -s mobile/android/key.properties
          grep -Eq '^storeFile=' mobile/android/key.properties
          grep -Eq '^storePassword=' mobile/android/key.properties
          grep -Eq '^keyAlias=' mobile/android/key.properties
          grep -Eq '^keyPassword=' mobile/android/key.properties

      - name: Restore Play Store service-account key
        env:
          PLAY_STORE_KEY_JSON: ${{ secrets.PLAY_STORE_KEY_JSON }}
        run: |
          set -euo pipefail
          test -n "${PLAY_STORE_KEY_JSON}"
          umask 077
          printf '%s' "$PLAY_STORE_KEY_JSON" > mobile/fastlane/play-store-key.json
          test -s mobile/fastlane/play-store-key.json

      - name: Upload Play internal build
        working-directory: mobile
        env:
          VERSION: ${{ needs.derive.outputs.version }}
          BUILD_NUMBER: ${{ needs.derive.outputs.build_number }}
          NOTES: ${{ needs.derive.outputs.release_notes }}
        run: |
          bundle exec fastlane android internal \
            version:"$VERSION" \
            build:"$BUILD_NUMBER" \
            notes:"$NOTES"

      - name: Upload Android release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-release-evidence-android
          path: mobile/build/release-evidence/mobile-release-evidence-android.json
          retention-days: 90

      - name: Always cleanup secrets
        if: always()
        run: |
          rm -f mobile/android/app/penny_release_key.jks \
                mobile/android/key.properties \
                mobile/fastlane/play-store-key.json

  summary:
    name: Internal release summary
    needs: [derive, preflight, ios, android]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print outcome
        run: |
          {
            echo "## Mobile internal release v${{ needs.derive.outputs.version }} (build ${{ needs.derive.outputs.build_number }})"
            echo ""
            echo "| Platform | Target | Status |"
            echo "|---|---|---|"
            echo "| iOS | TestFlight internal | ${{ needs.ios.result }} |"
            echo "| Android | Play internal testing | ${{ needs.android.result }} |"
            echo ""
            echo "Production promotion is manual via Mobile Production Promotion after internal validation passes."
          } >> "$GITHUB_STEP_SUMMARY"
