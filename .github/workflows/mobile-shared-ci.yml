name: Mobile Shared CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mobile-shared-ci:
    name: mobile-shared-ci
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Read pinned Flutter version
        id: flutter
        working-directory: mobile
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile
        run: flutter analyze

      - name: Run unit and widget tests
        working-directory: mobile
        run: flutter test --coverage --reporter expanded test

      - name: Upload Flutter coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
          retention-days: 14
