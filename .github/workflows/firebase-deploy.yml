name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Firebase deployment environment.
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'database/firestore.rules'
      - 'database/firestore.indexes.json'
      - 'database/storage.rules'
      - 'firebase.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-database:
    name: Deploy Database Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ inputs.environment || 'production' }}
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test Firestore and Storage rules before deploy
        run: npm run test:db

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.19.1

      - name: Deploy Firestore and Storage configuration
        run: |
          set -euo pipefail
          test -n "${FIREBASE_PROJECT_ID}"
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project "${FIREBASE_PROJECT_ID}" \
            --non-interactive
