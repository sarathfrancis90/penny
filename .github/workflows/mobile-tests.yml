name: Mobile Tests

on:
  push:
    branches: [main]
    paths:
      - 'mobile/lib/**'
      - 'mobile/test/**'
      - 'mobile/pubspec.yaml'
      - 'mobile/.flutter-version'
      - '.github/workflows/mobile-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'

jobs:
  test:
    name: Flutter Analyze + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pinned Flutter version
        id: flutter
        working-directory: mobile
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile
        # --no-fatal-infos: don't block on style/preference lints (still shown as info).
        # Errors and warnings still fail the build.
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        working-directory: mobile
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
          retention-days: 7
