name: Mobile Tests

on:
  push:
    branches: [main]
    paths:
      - 'mobile/lib/**'
      - 'mobile/test/**'
      - 'mobile/pubspec.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  test:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile
        run: dart analyze --fatal-infos || true

      - name: Run unit tests
        working-directory: mobile
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
          retention-days: 7
