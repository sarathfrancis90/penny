name: Agent Docs

on:
  workflow_dispatch:
  push:
    paths:
      - 'mobile/**'
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'scripts/api/**'
      - 'scripts/agents/**'
      - 'src/app/api/**'
      - 'src/lib/types.ts'
      - 'src/lib/types/**'
      - 'src/lib/categories.ts'
      - 'database/**'
      - 'docs/agents/**'
      - 'docs/api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.api.json'
      - 'Dockerfile.api'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'mobile/**'
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'scripts/api/**'
      - 'scripts/agents/**'
      - 'src/app/api/**'
      - 'src/lib/types.ts'
      - 'src/lib/types/**'
      - 'src/lib/categories.ts'
      - 'database/**'
      - 'docs/agents/**'
      - 'docs/api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.api.json'
      - 'Dockerfile.api'
      - '.github/workflows/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  agent-docs:
    name: Generated Agent Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-refresh generated docs
        run: npm run docs:auto

      - name: Write generated docs back to branch
        run: |
          if git diff --cached --quiet; then
            echo "No generated documentation changes to write back."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Generated documentation is stale, but this pull request comes from a fork."
            echo "Run npm run docs:auto locally and push the generated artifacts."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-refresh generated agent docs"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          else
            git push
          fi

      - name: Check generated agent docs
        run: npm run docs:agents:check

      - name: Lint agent docs
        run: npm run docs:agents:lint

      - name: Test agent docs automation
        run: npm run docs:agents:test
