name: Agent Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  agent-docs:
    name: Generated Agent Docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated agent docs
        run: npm run docs:agents:check

      - name: Lint agent docs
        run: npm run docs:agents:lint

      - name: Test agent docs automation
        run: npm run docs:agents:test
