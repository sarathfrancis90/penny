name: Store metrics fallback

# Runs 90 minutes after Vercel Cron. If Vercel missed a day, this job pings
# Discord. Doesn't try to fetch store data itself; safety net only.

on:
  schedule:
    - cron: '30 9 * * *' # 09:30 UTC = 04:30 America/Toronto
  workflow_dispatch:

concurrency:
  group: store-metrics-fallback
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      DISCORD_WEBHOOK_ALERTS_WARNING: ${{ secrets.DISCORD_WEBHOOK_ALERTS_WARNING }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.19.1

      - name: Check Vercel Cron wrote today's docs
        run: |
          set -euo pipefail
          test -n "${FIREBASE_PROJECT_ID}"
          YESTERDAY=$(date -u -d "yesterday" +%F)
          echo "Checking store_metrics/ios_${YESTERDAY} and store_metrics/android_${YESTERDAY}"

          if ! firebase firestore:get "store_metrics/ios_${YESTERDAY}" \
               --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
            test -n "${DISCORD_WEBHOOK_ALERTS_WARNING}"
            echo "iOS doc missing for $YESTERDAY"
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":rotating_light: store-metrics cron missed iOS for ${YESTERDAY}\"}" \
              "$DISCORD_WEBHOOK_ALERTS_WARNING"
          fi

          if ! firebase firestore:get "store_metrics/android_${YESTERDAY}" \
               --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
            test -n "${DISCORD_WEBHOOK_ALERTS_WARNING}"
            echo "Android doc missing for $YESTERDAY"
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"content\":\":rotating_light: store-metrics cron missed Android for ${YESTERDAY}\"}" \
              "$DISCORD_WEBHOOK_ALERTS_WARNING"
          fi
