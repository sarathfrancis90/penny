name: penny_mobile
description: "Penny — AI-powered expense tracker for Canadian professionals"
publish_to: 'none'
version: 2.1.0+28

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^19.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.2.0

  # Networking (for Next.js API calls)
  dio: ^5.9.2

  # UI
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  badges: ^3.1.2
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.17
  gap: ^3.0.1

  # Camera & Image
  image_picker: ^1.2.1

  # Local Storage
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^7.1.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  json_annotation: ^4.9.0
  firebase_crashlytics: ^5.1.0
  local_auth: ^3.0.1
  share_plus: ^12.0.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.0
  json_serializable: ^6.9.4
  patrol: ^4.5.0
  patrol_finders: ^3.2.0
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.4.6
  flutter_launcher_icons: ^0.14.4

patrol:
  app_name: Penny Mobile
  android:
    package_name: com.penny.penny_mobile
  ios:
    bundle_id: com.penny.pennyMobile

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/penny_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/penny_icon.png"
  remove_alpha_ios: true
  ios_content_mode: "scaleAspectFill"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/lottie/
    - assets/svg/

  # Using system fonts (SF Pro on iOS, Roboto on Android).
  # Add custom Inter font files later if needed.
